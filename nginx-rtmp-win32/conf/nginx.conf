worker_processes auto;
error_log logs/error.log warn;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            hls on;
            hls_path hls;
            hls_fragment 2s;
            hls_playlist_length 10s;
            hls_type live;
            hls_cleanup on;
        }
    }
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    access_log off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    server {
        listen 8080;

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root .;
            add_header 'Cache-Control' 'no-cache';
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'X-Accel-Buffering' 'no';
        }

        location /stat {
            rtmp_stat all;
        }

        location / {
            root ../fronted/dist;
            index index.html;
        }
    }
}
